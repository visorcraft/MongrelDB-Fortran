name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.48.0'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gfortran curl ca-certificates

      - name: Install fpm
        run: |
          # Install the Fortran Package Manager from its GitHub releases.
          # The linux-x86_64 asset is a standalone prebuilt binary (not a
          # tarball), so we download it directly and mark it executable.
          FPM_VERSION="0.10.1"
          mkdir -p /tmp/fpm-bin
          curl -fsSL -o /tmp/fpm-bin/fpm \
            "https://github.com/fortran-lang/fpm/releases/download/v${FPM_VERSION}/fpm-${FPM_VERSION}-linux-x86_64"
          chmod +x /tmp/fpm-bin/fpm
          echo "/tmp/fpm-bin" >> "$GITHUB_PATH"

      - name: Build
        run: fpm build --profile debug

      - name: Compiler warning check
        run: |
          mkdir -p /tmp/fortran-warning-check
          gfortran -Wall -Wextra -Wunused-variable -O2 -c src/mongreldb_http.f90 -o /tmp/fortran-warning-check/mongreldb_http.o
          gfortran -Wall -Wextra -Wunused-variable -O2 -c src/mongreldb_json.f90 -o /tmp/fortran-warning-check/mongreldb_json.o
          gfortran -Wall -Wextra -Wunused-variable -O2 -c src/mongreldb.f90 -o /tmp/fortran-warning-check/mongreldb.o
          gfortran -Wall -Wextra -Wunused-variable -O2 -o /tmp/fortran-warning-check/wire_shape_test tests/wire_shape_test.f90 /tmp/fortran-warning-check/mongreldb.o /tmp/fortran-warning-check/mongreldb_http.o /tmp/fortran-warning-check/mongreldb_json.o
          gfortran -Wall -Wextra -Wunused-variable -O2 -o /tmp/fortran-warning-check/live_test tests/live_test.f90 /tmp/fortran-warning-check/mongreldb.o /tmp/fortran-warning-check/mongreldb_http.o /tmp/fortran-warning-check/mongreldb_json.o

      - name: Run offline unit tests
        run: fpm test wire_shape --profile debug

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1 || true

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live integration tests
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: fpm test live_conformance --profile debug

      - name: Run examples
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: |
          for ex in basic_crud query_builder transactions; do
            echo "=== Running $ex ==="
            fpm run --example "$ex" --profile debug || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
